aid: refinitiv-eikon
name: Refinitiv Eikon
description: >-
  Refinitiv Eikon provides financial professionals with access to real-time
  market data, news, analytics, and trading capabilities. The Eikon Data API
  allows programmatic access to financial data including prices, fundamentals,
  reference data, and time series. Eikon was withdrawn from the LSEG product
  line on June 30, 2025, and has been succeeded by LSEG Workspace.
type: Index
image: https://www.refinitiv.com/content/dam/marketing/en_us/images/logos/refinitiv-logo.png
url: https://raw.githubusercontent.com/api-evangelist/refinitiv-eikon/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-05-02'
specificationVersion: '0.19'
tags:
  - Analytics
  - Financial Data
  - Financial News
  - Market Data
  - Real-Time Data
  - Trading
